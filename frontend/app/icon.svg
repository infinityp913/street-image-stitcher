<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0f172a"/>
  <!-- Panorama frame -->
  <rect x="3" y="10" width="26" height="12" rx="1.5" fill="#1e293b" stroke="#334155" stroke-width="0.75"/>
  <!-- Left image panel -->
  <rect x="4" y="11" width="8" height="10" rx="1" fill="#2563eb" opacity="0.6"/>
  <!-- Middle image panel -->
  <rect x="12.5" y="11" width="7" height="10" rx="0" fill="#1d4ed8" opacity="0.5"/>
  <!-- Right image panel -->
  <rect x="20" y="11" width="8" height="10" rx="1" fill="#2563eb" opacity="0.6"/>
  <!-- Stitch seam lines -->
  <line x1="12.5" y1="11" x2="12.5" y2="21" stroke="#64748b" stroke-width="0.75" stroke-dasharray="1.5 1"/>
  <line x1="19.5" y1="11" x2="19.5" y2="21" stroke="#64748b" stroke-width="0.75" stroke-dasharray="1.5 1"/>
  <!-- Subtle skyline silhouette in left panel -->
  <rect x="5" y="15" width="2" height="5" rx="0.3" fill="#3b82f6" opacity="0.7"/>
  <rect x="7.5" y="13" width="1.5" height="7" rx="0.3" fill="#3b82f6" opacity="0.7"/>
  <!-- Subtle skyline in right panel -->
  <rect x="21" y="14" width="2" height="6" rx="0.3" fill="#3b82f6" opacity="0.7"/>
  <rect x="23.5" y="12.5" width="1.5" height="7.5" rx="0.3" fill="#3b82f6" opacity="0.7"/>
</svg>
